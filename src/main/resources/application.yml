spring:
  application:
    name: ANO
  profiles:
    active: dev # 激活 application-dev.yml文件
  datasource:
    url: jdbc:mysql://localhost:3306/ano_pkm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
  ai:
    openai:
      api-key: ${ai.openai.api-key}
      base-url: ${ai.openai.base-url}
      chat:
        options:
          model: ${ai.openai.chat.options.model}
      embedding:
        options:
          model: ${ai.openai.embedding.options.model}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-not-delete-value: 0
      logic-delete-value: 1
  mapper-locations: classpath*:/mapper/**/*.xml

ano:
  security:
    dev-user-id: "1"
  knowledge:
    # 须与 Embedding 输出维数、RediSearch 索引 DIM 一致；百炼 text-embedding-v3 多为 1024
    vector-dimension: 1024
